<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="author" content="Denis Kudia">
        <!-- refresh page each 5 minutes -->
        <meta http-equiv="refresh" content="300">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <link rel="stylesheet" href="/static/css/weather.css">
    </head>

    <body>
        <div class="container">
            <h1 class="page_title">Current measurement</h1>

            <nav class="nav_links">
                <a href="status.html">status</a>
                <a href="default.html" class="active">current measurement</a>
                <a href="graph.html">measurements</a>
                <a href="files.html">files</a>
            </nav>

            <div class="data_grid">
                <div class="data_card">
                    <span class="label">Temperature:</span>
                    <span class="value"><!--{Temperature}--></span>
                </div>
                <div class="data_card">
                    <span class="label">Humidity:</span>
                    <span class="value"><!--{Humidity}-->%</span>
                </div>
                <div class="data_card">
                    <span class="label">Pressure:</span>
                    <span class="value"><!--{Pressure}--></span> mm Hg
                </div>
                <div class="data_card">
                    <span class="label">Luximity:</span>
                    <span class="value"><!--{Luximity}--></span> lux
                </div>
                <div class="data_card">
                    <span class="label">CO2:</span>
                    <span class="value"><!--{CO2}--></span> ppm [ <!--{CO2_Level}--> ]
                </div>
                <div class="data_card">
                    <span class="label">TVOC:</span>
                    <span class="value"><!--{TVOC}--></span> ppb [ <!--{TVOC_Level}--> ]
                </div>
            </div>
        </div>
    </body>
</html>

<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="author" content="Denis Kudia">
        <!-- refresh page each 5 minutes -->
        <meta http-equiv="refresh" content="300">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <link rel="stylesheet" href="/static/css/weather.css">
    </head>

    <body>
        <div class="container">
            <h1 class="page_title">Текущие значения</h1>

            <div class="data_grid">
                <div class="data_card">
                    <span class="label">Температура:</span>
                    <span class="value"><!--{Temperature}--></span> <!--{TempUnits}-->
                </div>
                <div class="data_card">
                    <span class="label">Влажность:</span>
                    <span class="value"><!--{Humidity}--></span> %
                </div>
                <div class="data_card">
                    <span class="label">Атмосферное давление:</span>
                    <span class="value"><!--{Pressure}--></span> мм рт.ст.
                </div>
                <div class="data_card">
                    <span class="label">CO2:</span>
                    <span class="value"><!--{CO2}--></span> [ <!--{CO2_Level}--> ]
                </div>
                <div class="data_card">
                    <span class="label">Загрязненность:</span>
                    <span class="value"><!--{TVOC}--></span> [ <!--{TVOC_Level}--> ]
                </div>
            </div>
        </div>
    </body>
</html>
